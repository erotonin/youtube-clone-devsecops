apiVersion: apps/v1
kind: Deployment
metadata:
  name: youtube-clone
  namespace: application
  labels:
    app: youtube-clone
spec:
  replicas: 3
  selector:
    matchLabels:
      app: youtube-clone
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: youtube-clone
    spec:
      containers:
        - name: youtube-clone
          image: 800557027783.dkr.ecr.ap-southeast-2.amazonaws.com/youtube-clone:v1
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "250m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          envFrom:
            - configMapRef:
                name: youtube-clone-config
          env:
            - name: REACT_APP_RAPID_API_KEY
              valueFrom:
                secretKeyRef:
                  name: youtube-clone-secret
                  key: REACT_APP_RAPID_API_KEY
